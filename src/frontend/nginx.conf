server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache for hashed Vite assets (assets/index-XXXX.js)
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Don't cache the entry HTML — needs to pick up new asset hashes after redeploy
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # SPA: any unknown path falls back to index.html so React Router handles it
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lightweight gzip for text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
